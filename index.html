<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Soccer Arena</title>
    <style>
        :root { --primary: #f39c12; --bg: #2c3e50; --panel: #34495e; --text: #ecf0f1; }
        body { margin: 0; overflow: hidden; background: var(--bg); font-family: 'Arial Black', sans-serif; color: var(--text); user-select: none; }
        
        /* UI Overlays */
        .overlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; transition: opacity 0.3s; }
        #menu-screen { background: linear-gradient(135deg, #1abc9c, #2980b9); }
        
        /* The Pause Screen */
        #pause-screen { background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(5px); display: none; z-index: 150; }
        
        .menu-panel { background: rgba(0,0,0,0.6); padding: 40px; border-radius: 20px; border: 4px solid var(--primary); box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 600px; }
        
        h1 { font-size: 50px; margin: 0 0 20px 0; color: var(--primary); text-transform: uppercase; text-shadow: 2px 2px 0 #000; }
        
        .form-group { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; font-size: 18px; }
        select, input { padding: 10px; border-radius: 5px; border: none; font-size: 16px; font-weight: bold; width: 200px; }
        input[type="text"] { text-align: center; }
        
        .btn { background: var(--primary); color: #000; padding: 15px 30px; font-size: 24px; font-weight: bold; border: none; border-radius: 10px; cursor: pointer; transition: transform 0.1s, background 0.2s; margin-top: 20px; width: 100%; text-transform: uppercase; }
        .btn:hover { transform: scale(1.05); background: #f1c40f; }
        .btn:active { transform: scale(0.95); }
        
        .btn-danger { background: #e74c3c; color: white; margin-top: 10px; }
        .btn-danger:hover { background: #c0392b; }
        
        #hud { position: absolute; top: 10px; left: 0; width: 100%; display: none; justify-content: center; z-index: 50; pointer-events: none; }
        .scoreboard { background: rgba(0,0,0,0.8); border: 3px solid var(--primary); padding: 10px 30px; border-radius: 30px; display: flex; align-items: center; gap: 20px; font-size: 32px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .team-name { font-size: 20px; width: 150px; text-align: center; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        #timer { color: var(--primary); font-family: monospace; font-size: 36px; margin: 0 20px; }
        
        #msg-board { position: absolute; top: 30%; width: 100%; text-align: center; font-size: 100px; color: var(--primary); text-shadow: 0 0 20px #000, 4px 4px 0 #000; display: none; z-index: 200; font-style: italic; }
        
        #controls-hint { position: absolute; bottom: 10px; width: 100%; text-align: center; color: rgba(255,255,255,0.7); font-size: 14px; pointer-events: none; }
        canvas { display: block; }
    </style>
</head>
<body>

    <div id="menu-screen" class="overlay">
        <div class="menu-panel">
            <h1>Ultimate Arena</h1>
            
            <div class="form-group">
                <label>Game Mode:</label>
                <select id="mode-select">
                    <option value="1vAI">1 Player vs AI</option>
                    <option value="1v1">1v1 Local Multiplayer</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Match Time:</label>
                <select id="time-select">
                    <option value="60">1 Minute</option>
                    <option value="120">2 Minutes</option>
                    <option value="180">3 Minutes</option>
                </select>
            </div>

            <div class="form-group">
                <label>AI Difficulty:</label>
                <select id="ai-select">
                    <option value="1.0">Amateur</option>
                    <option value="1.8" selected>Pro</option>
                    <option value="2.5">Legendary</option>
                </select>
            </div>

            <hr style="border:1px solid rgba(255,255,255,0.2); margin: 20px 0;">

            <div class="form-group">
                <label style="color:#3498db;">Home Team (P1):</label>
                <input type="text" id="p1-team" placeholder="e.g. Madrid" value="Madrid" list="team-list">
            </div>
            
            <div class="form-group">
                <label style="color:#e74c3c;">Away Team (P2/AI):</label>
                <input type="text" id="p2-team" placeholder="e.g. Manchester" value="Manchester" list="team-list">
            </div>

            <datalist id="team-list">
                <option value="Madrid"></option>
                <option value="Barcelona"></option>
                <option value="Manchester"></option>
                <option value="Bayern"></option>
                <option value="Paris"></option>
                <option value="Juventus"></option>
            </datalist>

            <button class="btn" onclick="startMatch()">KICK OFF</button>
        </div>
    </div>

    <div id="pause-screen" class="overlay">
        <div class="menu-panel">
            <h1>PAUSED</h1>
            <p style="margin-bottom: 30px;">Take a breather.</p>
            <button class="btn" onclick="togglePause()">RESUME MATCH</button>
            <button class="btn btn-danger" onclick="location.reload()">QUIT TO MENU</button>
        </div>
    </div>

    <div id="hud">
        <div class="scoreboard">
            <div id="p1-name" class="team-name" style="color:#3498db">P1</div>
            <span id="p1-score" style="color:#3498db">0</span>
            <div id="timer">01:00</div>
            <span id="p2-score" style="color:#e74c3c">0</span>
            <div id="p2-name" class="team-name" style="color:#e74c3c">CPU</div>
        </div>
    </div>

    <div id="msg-board">GOAL!</div>
    <div id="controls-hint">P1: WASD | P2: ARROWS &nbsp;&nbsp;&nbsp;&nbsp; JUMP/SHOOT: W / UP &nbsp;&nbsp;&nbsp;&nbsp; TACKLE: SPACE / ENTER &nbsp;&nbsp;&nbsp;&nbsp; PAUSE: ESC</div>
    
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const renderScale = 0.6; 
        let vWidth, vHeight, groundY;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            vWidth = canvas.width / renderScale;
            vHeight = canvas.height / renderScale;
            groundY = vHeight - 80;
        }
        resizeCanvas();

        let gameState = 'menu';
        let mode, timeRemaining, aiDifficulty;
        let p1Score = 0, p2Score = 0;
        let lastTime = Date.now();
        const keys = {};
        let isGoalScored = false;

        function getTeamColor(name) {
            const colors = ['#3498db', '#e74c3c', '#2ecc7 green', '#9b59b6', '#f1c40f', '#e67e22', '#ffffff', '#000000'];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return colors[Math.abs(hash) % colors.length];
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSfx(type) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            g.connect(audioCtx.destination); o.connect(g);
            const now = audioCtx.currentTime;
            
            if(type === 'kick') {
                o.type = 'sine'; o.frequency.setValueAtTime(150, now); o.frequency.exponentialRampToValueAtTime(0.01, now + 0.3);
                g.gain.setValueAtTime(1, now); g.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                o.start(now); o.stop(now + 0.3);
            } else if (type === 'whistle') {
                o.type = 'square'; o.frequency.setValueAtTime(800, now); o.frequency.setValueAtTime(1200, now + 0.2);
                g.gain.setValueAtTime(0.5, now); g.gain.linearRampToValueAtTime(0, now + 0.6);
                o.start(now); o.stop(now + 0.6);
            } else if (type === 'goal') {
                o.type = 'sawtooth'; o.frequency.setValueAtTime(300, now); o.frequency.linearRampToValueAtTime(600, now + 1);
                g.gain.setValueAtTime(0.3, now); g.gain.linearRampToValueAtTime(0, now + 1.5);
                o.start(now); o.stop(now + 1.5);
            }
        }

        let particles = [];
        function createExplosion(x, y, color) {
            for(let i=0; i<30; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 20,
                    life: 1.0, color: color, size: Math.random() * 8 + 4
                });
            }
        }
        function drawParticles() {
            for(let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                if(p.life <= 0) { particles.splice(i, 1); continue; }
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        class Player {
            constructor(x, isRight, color, isAI) {
                this.x = x; this.y = groundY - 50;
                this.color = color;
                this.isRight = isRight;
                this.isAI = isAI;
                this.velX = 0; this.velY = 0;
                this.isJumping = false;
                this.isTackling = false;
                this.tackleTimer = 0;
            }
            
            draw() {
                const flip = this.isRight ? -1 : 1;
                ctx.save();
                ctx.translate(this.x, this.y);
                if(this.isTackling) ctx.rotate(flip * Math.PI/4);

                ctx.fillStyle = this.color;
                ctx.beginPath(); 
                if(ctx.roundRect) ctx.roundRect(-20, 0, 40, 50, 10); else ctx.rect(-20, 0, 40, 50);
                ctx.fill(); 
                
                ctx.strokeStyle = '#222'; ctx.lineWidth = 8;
                let walk = this.isJumping || this.isTackling ? 0 : Math.sin(Date.now() * 0.015) * 15;
                ctx.beginPath(); ctx.moveTo(-10, 40); ctx.lineTo(-10 + (this.velX*2), 70 + walk); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(10, 40); ctx.lineTo(10 + (this.velX*2), 70 - walk); ctx.stroke();

                ctx.fillStyle = '#f1c27d'; 
                ctx.beginPath(); ctx.arc(0, -35, 40, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = 'white'; ctx.beginPath(); ctx.arc(15*flip, -45, 12, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = 'black'; ctx.beginPath(); ctx.arc(18*flip, -45, 5, 0, Math.PI*2); ctx.fill(); 
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(15*flip, -20, 10, 0.2, Math.PI-0.2); ctx.stroke();

                ctx.restore();
            }

            update() {
                this.x += this.velX; this.y += this.velY;
                if (this.y < groundY - 50) this.velY += 1;
                else { this.y = groundY - 50; this.velY = 0; this.isJumping = false; }
                
                if(this.isTackling) {
                    this.tackleTimer--;
                    if(this.tackleTimer <= 0) this.isTackling = false;
                } else {
                    this.velX *= 0.85; 
                }

                if(this.x < 40) this.x = 40;
                if(this.x > vWidth - 40) this.x = vWidth - 40;
            }
        }

        const ball = {
            x: 0, y: 0, radius: 20, velX: 0, velY: 0, rotation: 0, owner: null, cooldown: 0,
            update() {
                if(this.cooldown > 0) this.cooldown--;
                if (this.owner) {
                    let p = this.owner;
                    let facingFlip = p.isRight ? -1 : 1; 
                    this.x = p.x + (facingFlip * 35);
                    this.y = p.y + 10;
                    this.velX = p.velX;
                    this.velY = p.velY;
                } else {
                    this.x += this.velX; this.y += this.velY;
                    this.rotation += this.velX * 0.05;

                    if (this.y < groundY - this.radius) this.velY += 0.6;
                    else { 
                        this.y = groundY - this.radius; 
                        this.velY *= -0.6; 
                        this.velX *= 0.96; 
                    }

                    if (this.x < this.radius || this.x > vWidth - this.radius) {
                        this.velX *= -0.8;
                    }
                }
            },
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.rotation);
                
                ctx.fillStyle = 'white';
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.fill();
                
                ctx.fillStyle = 'black';
                ctx.beginPath(); ctx.arc(0, 0, 8, 0, Math.PI*2); ctx.fill();
                for(let i=0; i<5; i++) {
                    ctx.beginPath(); ctx.arc(Math.cos(i*1.25) * 14, Math.sin(i*1.25) * 14, 4, 0, Math.PI*2); ctx.fill();
                }
                
                ctx.strokeStyle = 'black'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 0, this.radius, 0, Math.PI*2); ctx.stroke();
                ctx.restore();
            }
        };

        let p1, p2;

        function drawStadium() {
            let grad = ctx.createLinearGradient(0, 0, 0, vHeight);
            grad.addColorStop(0, '#0a3d62'); grad.addColorStop(1, '#3c6382');
            ctx.fillStyle = grad; ctx.fillRect(0, 0, vWidth, vHeight);

            ctx.fillStyle = '#222'; ctx.fillRect(0, vHeight/2 - 100, vWidth, 300);
            for(let i=0; i<150; i++) {
                ctx.fillStyle = ['#e74c3c', '#3498db', '#f1c40f', '#ecf0f1'][Math.floor(Math.random()*4)];
                let cx = (i * 40) % vWidth;
                let cy = vHeight/2 - 80 + Math.floor(i/ (vWidth/40)) * 30;
                ctx.beginPath(); ctx.arc(cx, cy, 5, 0, Math.PI*2); ctx.fill();
            }

            ctx.fillStyle = '#27ae60'; ctx.fillRect(0, groundY, vWidth, vHeight - groundY);
            ctx.strokeStyle = '#2ecc71'; ctx.lineWidth = 10;
            ctx.beginPath(); ctx.moveTo(0, groundY+40); ctx.lineTo(vWidth, groundY+40); ctx.stroke(); 
            
            ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.strokeStyle = 'white'; ctx.lineWidth = 6;
            ctx.fillRect(0, groundY - 200, 80, 200); ctx.strokeRect(0, groundY - 200, 80, 200);
            ctx.fillRect(vWidth - 80, groundY - 200, 80, 200); ctx.strokeRect(vWidth - 80, groundY - 200, 80, 200);
        }

        function togglePause() {
            if (gameState === 'playing') {
                gameState = 'paused';
                document.getElementById('pause-screen').style.display = 'flex';
            } else if (gameState === 'paused') {
                gameState = 'playing';
                document.getElementById('pause-screen').style.display = 'none';
                lastTime = Date.now();
                loop(); 
            }
        }

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Escape' && !e.repeat) togglePause();
        });
        window.addEventListener('keyup', (e) => { keys[e.code] = false; });
        window.addEventListener('resize', resizeCanvas);

        function startMatch() {
            mode = document.getElementById('mode-select').value;
            timeRemaining = parseInt(document.getElementById('time-select').value);
            aiDifficulty = parseFloat(document.getElementById('ai-select').value);
            
            let t1 = document.getElementById('p1-team').value || "P1";
            let t2 = document.getElementById('p2-team').value || "CPU";
            
            document.getElementById('p1-name').innerText = t1;
            document.getElementById('p2-name').innerText = t2;
            
            p1 = new Player(vWidth/2 - 300, false, getTeamColor(t1), false);
            p2 = new Player(vWidth/2 + 300, true, getTeamColor(t2), mode === '1vAI');
            
            document.getElementById('menu-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('menu-screen').style.display = 'none';
                document.getElementById('hud').style.display = 'flex';
                gameState = 'playing';
                playSfx('whistle');
                resetCenter();
                lastTime = Date.now();
                loop();
            }, 300);
        }

        function loop() {
            if (gameState !== 'playing') return;

            let now = Date.now();
            if (now - lastTime >= 1000) {
                timeRemaining--; lastTime = now;
                let m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
                let s = (timeRemaining % 60).toString().padStart(2, '0');
                document.getElementById('timer').innerText = `${m}:${s}`;
                if (timeRemaining <= 0) { endGame(); return; }
            }

            // P1 CONTROLS
            if (keys['KeyA']) { p1.velX -= 2.2; p1.isRight = true; } 
            if (keys['KeyD']) { p1.velX += 2.2; p1.isRight = false; } 
            if (keys['KeyW'] && !p1.isJumping) { 
                if (ball.owner === p1) {
                    ball.owner = null; ball.cooldown = 15;
                    let facingFlip = p1.isRight ? -1 : 1; 
                    ball.velX = facingFlip * 35; ball.velY = -15; playSfx('kick');
                    createExplosion(ball.x, ball.y, 'white');
                } else { p1.velY = -16; p1.isJumping = true; }
            }
            if (keys['Space'] && !p1.isTackling) { p1.isTackling = true; p1.tackleTimer = 20; p1.velX = p1.isRight ? -25 : 25; }

            // --- AI LOGIC ---
            if (p2.isAI) {
                let dx = ball.x - p2.x;
                if (ball.owner === p2) {
                    p2.velX -= (aiDifficulty + 1.2); 
                    p2.isRight = true; 
                    if (p2.x < 400 || Math.abs(p1.x - p2.x) < 100) {
                        if (!p2.isJumping) {
                            ball.owner = null; ball.cooldown = 15;
                            ball.velX = -35 - (aiDifficulty * 5); ball.velY = -15; 
                            playSfx('kick');
                        }
                    }
                } else {
                    if (dx < -30) { p2.velX -= (aiDifficulty + 1); p2.isRight = true; }
                    else if (dx > 30) { p2.velX += (aiDifficulty + 1); p2.isRight = false; }
                    if (Math.abs(dx) < 120 && !p2.isTackling && ball.owner === p1) {
                        p2.isTackling = true; p2.tackleTimer = 20; p2.velX = (dx > 0) ? 25 : -25;
                    }
                }
            } else {
                // P2 MANUAL CONTROLS
                if (keys['ArrowLeft']) { p2.velX -= 2.2; p2.isRight = true; }
                if (keys['ArrowRight']) { p2.velX += 2.2; p2.isRight = false; }
                if (keys['ArrowUp'] && !p2.isJumping) { 
                    if (ball.owner === p2) {
                        ball.owner = null; ball.cooldown = 15;
                        let facingFlip = p2.isRight ? -1 : 1; 
                        ball.velX = facingFlip * 35; ball.velY = -15; playSfx('kick');
                        createExplosion(ball.x, ball.y, 'white');
                    } else { p2.velY = -16; p2.isJumping = true; }
                }
                if (keys['Enter'] && !p2.isTackling) { p2.isTackling = true; p2.tackleTimer = 20; p2.velX = p2.isRight ? -25 : 25; }
            }

            p1.update(); p2.update(); ball.update();

            // --- REFINED STEALING AND POSSESSION ---
            
            // 1. Stealing logic
            let pDist = Math.hypot(p1.x - p2.x, p1.y - p2.y);
            if (pDist < 75) {
                if (ball.owner === p1 && p2.isTackling) {
                    ball.owner = null; ball.cooldown = 5; // Low cooldown so AI can grab it immediately
                    ball.velX = -20; ball.velY = -10;
                    playSfx('kick'); createExplosion(ball.x, ball.y, p2.color);
                } else if (ball.owner === p2 && p1.isTackling) {
                    ball.owner = null; ball.cooldown = 5;
                    ball.velX = 20; ball.velY = -10;
                    playSfx('kick'); createExplosion(ball.x, ball.y, p1.color);
                }
            }

            // 2. Pickup Logic (Fix: Allowed during tackle)
            if (!ball.owner && ball.cooldown <= 0) {
                [p1, p2].forEach(p => {
                    let bDist = Math.hypot(ball.x - p.x, ball.y - p.y);
                    // AI gets a tiny bit more range to make it feel competitive
                    let range = p.isAI ? 65 : 55; 
                    if (bDist < range && !p.isJumping) {
                        ball.owner = p;
                        ball.velY = 0;
                    }
                });
            }

            if (!isGoalScored) {
                if (ball.x < 80 && ball.y > groundY - 200) { handleGoal(2); }
                if (ball.x > vWidth - 80 && ball.y > groundY - 200) { handleGoal(1); }
            }

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.save();
            ctx.scale(renderScale, renderScale); 

            drawStadium();
            p1.draw(); 
            p2.draw(); 
            ball.draw(); 
            drawParticles();

            ctx.restore();
            requestAnimationFrame(loop);
        }

        function handleGoal(scorer) {
            isGoalScored = true; playSfx('goal');
            ball.owner = null; 
            createExplosion(ball.x, ball.y, scorer === 1 ? '#3498db' : '#e74c3c');
            
            if(scorer === 1) p1Score++; else p2Score++;
            document.getElementById('p1-score').innerText = p1Score;
            document.getElementById('p2-score').innerText = p2Score;
            
            let mb = document.getElementById('msg-board');
            mb.style.display = 'block'; mb.innerText = "GOAL!";
            
            setTimeout(() => { mb.style.display = 'none'; resetCenter(); }, 2000);
        }

        function resetCenter() {
            ball.x = vWidth / 2; ball.y = 100; ball.velX = 0; ball.velY = 0; ball.owner = null; ball.cooldown = 0;
            p1.x = vWidth / 2 - 300; p1.velX = 0; p1.isRight = false; p1.isJumping = false; p1.isTackling = false;
            p2.x = vWidth / 2 + 300; p2.velX = 0; p2.isRight = true; p2.isJumping = false; p2.isTackling = false;
            isGoalScored = false; 
        }

        function endGame() {
            gameState = 'over'; playSfx('whistle');
            let mb = document.getElementById('msg-board'); mb.style.display = 'block';
            if(p1Score > p2Score) mb.innerText = "PLAYER 1 WINS!";
            else if(p2Score > p1Score) mb.innerText = "PLAYER 2 WINS!";
            else mb.innerText = "DRAW!";
            setTimeout(() => location.reload(), 5000); 
        }
    </script>
</body>
</html>
